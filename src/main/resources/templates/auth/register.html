<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:       #f59e0b;
            --primary-dark:  #d97706;
            --primary-light: #fef3c7;
            --bg:            #0f172a;
            --surface:       #1e293b;
            --surface-2:     #273549;
            --border:        rgba(255,255,255,.08);
            --text:          #f1f5f9;
            --muted:         #94a3b8;
            --danger:        #ef4444;
            --success:       #10b981;
            --radius:        14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(245,158,11,.09) 0%, transparent 60%),
                    radial-gradient(ellipse 50% 50% at 20% 90%, rgba(139,92,246,.07) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 0%, transparent 100%);
        }

        .auth-wrap {
            position: relative; z-index: 1;
            width: 100%;
            max-width: 500px;
            animation: fadeUp .35s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
            text-decoration: none;
        }
        .auth-logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px; color: #fff;
        }
        .auth-logo-text { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }


        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,.4);
        }

        .auth-title   { font-size: 1.3rem; font-weight: 800; color: #fff; letter-spacing: -.03em; margin-bottom: 6px; }
        .auth-sub     { font-size: 13.5px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

        /* form row */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .form-group { margin-bottom: 16px; }
        .form-group.full { grid-column: 1 / -1; }

        .form-label {
            display: block; font-size: 12.5px; font-weight: 700;
            color: var(--text); margin-bottom: 7px;
            display: flex; align-items: center; gap: 5px;
        }
        .label-opt { font-size: 11px; color: var(--muted); font-weight: 400; }
        .label-req { color: var(--danger); }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 14px; pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px 10px 38px;
            font-size: 13.5px; font-family: inherit;
            color: var(--text);
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-control::placeholder { color: #475569; }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245,158,11,.12);
        }
        .form-control.is-invalid { border-color: var(--danger); }

        .pw-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 14px;
            transition: color .15s;
        }
        .pw-toggle:hover { color: var(--text); }

        /* password strength */
        .pw-strength { margin-top: 8px; }
        .pw-bars { display: flex; gap: 4px; margin-bottom: 5px; }
        .pw-bar {
            flex: 1; height: 3px; border-radius: 2px;
            background: rgba(255,255,255,.1);
            transition: background .25s;
        }
        .pw-bar.weak   { background: var(--danger); }
        .pw-bar.medium { background: var(--primary); }
        .pw-bar.strong { background: var(--success); }
        .pw-label { font-size: 11.5px; color: var(--muted); }

        /* terms */
        .terms-check {
            display: flex; align-items: flex-start; gap: 9px;
            padding: 12px 14px;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            margin-bottom: 20px;
            font-size: 13px; color: var(--muted);
            line-height: 1.5; cursor: pointer;
        }
        .terms-check input { accent-color: var(--primary); margin-top: 2px; flex-shrink: 0; }
        .terms-check a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .invalid-feedback {
            font-size: 12px; color: #f87171;
            margin-top: 5px; display: flex; align-items: center; gap: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--primary); color: #fff;
            font-size: 14px; font-family: inherit; font-weight: 700;
            border: none; border-radius: 10px;
            cursor: pointer; transition: all .15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 2px 12px rgba(245,158,11,.3);
        }
        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,.35);
        }

        .auth-footer { text-align: center; margin-top: 20px; font-size: 13.5px; color: var(--muted); }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }

        .back-home {
            display: flex; align-items: center; gap: 6px; justify-content: center;
            margin-top: 16px;
            font-size: 13px; color: var(--muted); text-decoration: none;
            transition: color .15s;
        }
        .back-home:hover { color: var(--text); }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="auth-wrap">

    <a href="/" class="auth-logo">
        <div class="auth-logo-icon"><i class="bi bi-box-seam"></i></div>
        <span class="auth-logo-text">Smart Inventory</span>
    </a>

    <div class="auth-card">

        <h1 class="auth-title">Akkaunt yarating</h1>
        <p class="auth-sub">Smart Inventory tizimiga qo'shiling. Barcha maydonlarni to'ldiring.</p>

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <form th:action="@{/auth/register}" th:object="${userDto}" method="post">

            <div class="form-row">

                <div class="form-group">
                    <label class="form-label">
                        Username <span class="label-req">*</span>
                    </label>
                    <div class="input-wrap">
                        <i class="bi bi-at input-icon"></i>
                        <input type="text"
                               th:field="*{username}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                               placeholder="username"
                               autocomplete="username">
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span th:errors="*{username}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        To'liq ism <span class="label-opt">(ixtiyoriy)</span>
                    </label>
                    <div class="input-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text"
                               th:field="*{fullName}"
                               class="form-control"
                               placeholder="Ism Familya">
                    </div>
                </div>

                <div class="form-group full">
                    <label class="form-label">
                        Email <span class="label-req">*</span>
                    </label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"
                               placeholder="email@example.com"
                               autocomplete="email">
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span th:errors="*{email}"></span>
                    </div>
                </div>

                <div class="form-group full">
                    <label class="form-label">
                        Parol <span class="label-req">*</span>
                    </label>
                    <div class="input-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password"
                               th:field="*{password}"
                               id="regPassword"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"
                               placeholder="Kamida 6 ta belgi"
                               oninput="checkStrength(this.value)"
                               autocomplete="new-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('regPassword', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span th:errors="*{password}"></span>
                    </div>
                    <div class="pw-strength">
                        <div class="pw-bars">
                            <div class="pw-bar" id="bar1"></div>
                            <div class="pw-bar" id="bar2"></div>
                            <div class="pw-bar" id="bar3"></div>
                            <div class="pw-bar" id="bar4"></div>
                        </div>
                        <div class="pw-label" id="pwLabel">Parol kuchini tekshirish uchun yozing</div>
                    </div>
                </div>

            </div>

            <label class="terms-check">
                <input type="checkbox" required>
                <span>
                    <a href="#">Foydalanish shartlari</a> va
                    <a href="#">Maxfiylik siyosati</a> bilan tanishib chiqdim va roziman.
                </span>
            </label>

            <button type="submit" class="btn-submit">
                <i class="bi bi-person-check-fill"></i> Ro'yxatdan o'tish
            </button>

        </form>
    </div>

    <div class="auth-footer">
        Akkauntingiz bormi? <a th:href="@{/auth/login}">Kirish</a>
    </div>

    <a href="/" class="back-home">
        <i class="bi bi-arrow-left" style="font-size:12px;"></i> Bosh sahifaga qaytish
    </a>

</div>

<script>
    function togglePw(id, btn) {
        const input = document.getElementById(id);
        const icon  = btn.querySelector('i');
        input.type  = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
    }

    function checkStrength(val) {
        const bars  = [1,2,3,4].map(i => document.getElementById('bar' + i));
        const label = document.getElementById('pwLabel');
        bars.forEach(b => b.className = 'pw-bar');

        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = ['', 'weak', 'medium', 'medium', 'strong'];
        const labels = ['', 'Zaif', "O'rtacha", "O'rtacha", 'Kuchli'];
        const colors = { weak: '#ef4444', medium: '#f59e0b', strong: '#10b981' };

        for (let i = 0; i < score; i++) {
            bars[i].classList.add(levels[score]);
        }
        label.textContent  = val ? labels[score] : 'Parol kuchini tekshirish uchun yozing';
        label.style.color  = val && colors[levels[score]] ? colors[levels[score]] : '';
    }
</script>
</body>
</html>
