<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:       #f59e0b;
            --primary-dark:  #d97706;
            --primary-light: #fef3c7;
            --bg:            #0f172a;
            --surface:       #1e293b;
            --surface-2:     #273549;
            --border:        rgba(255,255,255,.08);
            --border-focus:  rgba(245,158,11,.4);
            --text:          #f1f5f9;
            --muted:         #94a3b8;
            --danger:        #ef4444;
            --success:       #10b981;
            --radius:        14px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(245,158,11,.1) 0%, transparent 60%),
                    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(59,130,246,.07) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 0%, transparent 100%);
        }

        /* ── AUTH CARD ── */
        .auth-wrap {
            position: relative; z-index: 1;
            width: 100%;
            max-width: 440px;
            animation: fadeUp .35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* logo top */
        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
            text-decoration: none;
        }
        .auth-logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px; color: #fff;
        }
        .auth-logo-text {
            font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px;
        }

        /* card */
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,.4);
        }

        .auth-title {
            font-size: 1.35rem; font-weight: 800; color: #fff;
            letter-spacing: -.03em; margin-bottom: 6px;
        }
        .auth-sub {
            font-size: 13.5px; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
        }

        /* divider */
        .auth-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 22px 0;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .auth-divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block; font-size: 13px; font-weight: 700;
            color: var(--text); margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 15px; pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px 11px 40px;
            font-size: 14px; font-family: inherit;
            color: var(--text);
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-control::placeholder { color: #475569; }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245,158,11,.12);
            background: rgba(245,158,11,.03);
        }
        .form-control.is-invalid { border-color: var(--danger); }

        /* password toggle */
        .pw-toggle {
            position: absolute; right: 13px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 15px; padding: 2px;
            transition: color .15s;
        }
        .pw-toggle:hover { color: var(--text); }

        /* remember / forgot */
        .form-meta {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 22px;
        }

        .form-check-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13.5px; color: var(--muted); cursor: pointer;
            font-family: inherit;
        }
        .form-check-input {
            width: 16px; height: 16px;
            border-radius: 4px;
            background: var(--surface-2);
            border: 1.5px solid rgba(255,255,255,.15);
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-link {
            font-size: 13px; font-weight: 600; color: var(--primary);
            text-decoration: none; transition: color .15s;
        }
        .forgot-link:hover { color: var(--primary-dark); }

        /* error alert */
        .alert-error {
            display: flex; align-items: flex-start; gap: 10px;
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13.5px; color: #fca5a5;
        }
        .alert-error i { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

        /* success alert */
        .alert-success {
            display: flex; align-items: flex-start; gap: 10px;
            background: rgba(16,185,129,.1);
            border: 1px solid rgba(16,185,129,.25);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13.5px; color: #6ee7b7;
        }

        /* ── BUTTON ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #fff;
            font-size: 14px; font-family: inherit; font-weight: 700;
            border: none; border-radius: 10px;
            cursor: pointer; transition: all .15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 2px 12px rgba(245,158,11,.3);
        }
        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,.35);
        }
        .btn-submit:active { transform: translateY(0); }

        /* footer link */
        .auth-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 13.5px; color: var(--muted);
        }
        .auth-footer a {
            color: var(--primary); font-weight: 600; text-decoration: none;
        }
        .auth-footer a:hover { color: var(--primary-dark); }

        /* back to home */
        .back-home {
            display: flex; align-items: center; gap: 6px; justify-content: center;
            margin-top: 18px;
            font-size: 13px; color: var(--muted); text-decoration: none;
            transition: color .15s;
        }
        .back-home:hover { color: var(--text); }

        .invalid-feedback {
            font-size: 12px; color: #f87171;
            margin-top: 5px; display: flex; align-items: center; gap: 4px;
        }
        .invalid-feedback i { font-size: 11px; }
    </style>
</head>
<body>

<div class="auth-wrap">

    <a href="/" class="auth-logo">
        <div class="auth-logo-icon"><i class="bi bi-box-seam"></i></div>
        <span class="auth-logo-text">Smart Store</span>
    </a>

    <div class="auth-card">

        <h1 class="auth-title">Xush kelibsiz!</h1>
        <p class="auth-sub">Tizimga kirish uchun ma'lumotlaringizni kiriting.</p>

        <!-- Spring Security error param -->
        <div class="alert-error" th:if="${param.error}">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Username yoki parol noto'g'ri. Qaytadan urinib ko'ring.</span>
        </div>

        <!-- Spring Security logout param -->
        <div class="alert-success" th:if="${param.logout}">
            <i class="bi bi-check-circle-fill"></i>
            <span>Tizimdan muvaffaqiyatli chiqdingiz.</span>
        </div>

        <!-- Spring Security login form — action="/auth/login" Spring ga moslab o'zgartiring -->
        <form th:action="@{/auth/login}" method="post">

            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="username kiriting"
                           autocomplete="username"
                           required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Parol</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password"
                           name="password"
                           id="loginPassword"
                           class="form-control"
                           placeholder="••••••••"
                           autocomplete="current-password"
                           required>
                    <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-meta">
                <label class="form-check-label">
                    <input type="checkbox" name="remember-me" class="form-check-input">
                    Eslab qolish
                </label>
                <a href="#" class="forgot-link">Parolni unutdingizmi?</a>
            </div>

            <!-- CSRF token for Spring Security -->

            <button type="submit" class="btn-submit">
                <i class="bi bi-box-arrow-in-right"></i> Kirish
            </button>

        </form>

    </div>

    <div class="auth-footer">
        Akkauntingiz yo'qmi? <a th:href="@{/auth/register}">Ro'yxatdan o'ting</a>
    </div>

    <a href="/home" class="back-home">
        <i class="bi bi-arrow-left" style="font-size:12px;"></i> Bosh sahifaga qaytish
    </a>

</div>

<script>
    function togglePw(id, btn) {
        const input = document.getElementById(id);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
