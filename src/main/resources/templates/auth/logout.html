<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiqish | Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b; --primary-dark: #d97706;
            --bg: #0f172a; --surface: #1e293b; --surface-2: #273549;
            --border: rgba(255,255,255,.08);
            --text: #f1f5f9; --muted: #94a3b8;
            --danger: #ef4444; --danger-light: rgba(239,68,68,.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(239,68,68,.07) 0%, transparent 60%);
            pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 28px 28px; pointer-events: none;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 0%, transparent 100%);
        }

        .logout-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            animation: fadeUp .35s ease both;
            text-align: center;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center; margin-bottom: 28px; text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px; background: var(--primary);
            border-radius: 11px; display: flex; align-items: center; justify-content: center;
            font-size: 19px; color: #fff;
        }
        .logo-text { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }

        .logout-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,.4);
        }

        .logout-icon-wrap {
            width: 72px; height: 72px;
            background: var(--danger-light);
            border: 1px solid rgba(239,68,68,.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: var(--danger);
            margin: 0 auto 22px;
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.2); }
            50%       { box-shadow: 0 0 0 12px rgba(239,68,68,.0); }
        }

        .logout-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .logout-text  { font-size: 13.5px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }

        .btn-row { display: flex; flex-direction: column; gap: 10px; }

        .btn-danger {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px; width: 100%;
            background: var(--danger); color: #fff;
            font-size: 14px; font-family: inherit; font-weight: 700;
            border: none; border-radius: 10px; cursor: pointer;
            text-decoration: none;
            transition: all .15s;
            box-shadow: 0 2px 12px rgba(239,68,68,.3);
        }
        .btn-danger:hover { background: #dc2626; color: #fff; transform: translateY(-1px); }

        .btn-ghost {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px; width: 100%;
            background: var(--surface-2); color: var(--muted);
            border: 1.5px solid var(--border);
            font-size: 14px; font-family: inherit; font-weight: 600;
            border-radius: 10px; cursor: pointer;
            text-decoration: none;
            transition: all .15s;
        }
        .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

        /* auto redirect countdown */
        .countdown-note {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 20px;
            font-size: 12.5px; color: var(--muted);
        }
        .countdown-note span { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<div class="logout-wrap">

    <a href="/" class="auth-logo">
        <div class="logo-icon"><i class="bi bi-box-seam"></i></div>
        <span class="logo-text">Smart Inventory</span>
    </a>

    <div class="logout-card">

        <div class="logout-icon-wrap">
            <i class="bi bi-box-arrow-right"></i>
        </div>

        <h1 class="logout-title">Tizimdan chiqmoqchimisiz?</h1>
        <p class="logout-text">
            Chiqsangiz, barcha ochiq sessiyalar yopiladi. Qayta kirishingiz uchun username va parolingizni kiritishingiz kerak bo'ladi.
        </p>

        <div class="btn-row">
            <!-- Spring Security logout -->
            <form th:action="@{/auth/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn-danger">
                    <i class="bi bi-box-arrow-right"></i> Ha, tizimdan chiqish
                </button>
            </form>

            <a href="javascript:history.back()" class="btn-ghost">
                <i class="bi bi-arrow-left"></i> Bekor qilish
            </a>
        </div>

    </div>

    <div class="countdown-note">
        <i class="bi bi-info-circle"></i>
        <span>30</span> soniyada avtomatik bekor qilinadi
    </div>

</div>

<script>
    let t = 30;
    const span = document.querySelector('.countdown-note span');
    const interval = setInterval(() => {
        t--;
        span.textContent = t;
        if (t <= 0) { clearInterval(interval); history.back(); }
    }, 1000);
</script>
</body>
</html>
