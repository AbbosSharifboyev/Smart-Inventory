<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="sidebar(activePage)">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --sidebar-bg: #0f172a;
            --sidebar-border: rgba(255,255,255,.07);
            --sidebar-text: #94a3b8;
            --sidebar-hover-bg: rgba(255,255,255,.05);
            --sidebar-hover-text: #cbd5e1;
            --sidebar-active-bg: rgba(245,158,11,.12);
            --sidebar-active-text: #f59e0b;
            --primary: #f59e0b;
            --plus-jakarta: 'Plus Jakarta Sans', sans-serif;
        }

        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            font-family: var(--plus-jakarta);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 22px 20px;
            border-bottom: 1px solid var(--sidebar-border);
            flex-shrink: 0;
        }

        .sidebar-logo-icon {
            width: 36px; height: 36px;
            background: var(--primary);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            color: #fff;
            flex-shrink: 0;
        }

        .sidebar-logo-text {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.2px;
            line-height: 1.2;
        }

        .sidebar-logo-sub {
            font-size: 10.5px;
            color: var(--sidebar-text);
            font-weight: 500;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0 16px;
        }

        .sidebar-nav::-webkit-scrollbar { width: 3px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

        .sidebar-section {
            padding: 12px 12px 4px;
        }

        .sidebar-section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #334155;
            padding: 0 8px;
            margin-bottom: 4px;
            display: block;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--sidebar-text);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
            margin-bottom: 1px;
            font-family: var(--plus-jakarta);
        }

        .sidebar .nav-link:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-hover-text);
        }

        .sidebar .nav-link.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-text);
        }

        .sidebar .nav-link i {
            font-size: 15px;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
            margin-right: 0;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--sidebar-border);
            margin: 8px 12px;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--sidebar-border);
            flex-shrink: 0;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
        }

        .sidebar-user:hover { background: var(--sidebar-hover-bg); }

        .sidebar-user-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff;
            flex-shrink: 0;
        }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            line-height: 1.2;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: #475569;
        }
    </style>


    <aside class="sidebar d-none d-lg-flex flex-column"
            sec:authorize="hasAnyRole('ADMIN','MANAGER')">

        <div class="sidebar-logo">
            <div class="sidebar-logo-icon"><i class="bi bi-box-seam"></i></div>
            <div>
                <div class="sidebar-logo-text">Smart Store</div>
                <div class="sidebar-logo-sub">Management System</div>
            </div>
        </div>

        <nav class="sidebar-nav">

            <div class="sidebar-section">
                <span class="sidebar-section-label">Asosiy</span>
                <a class="nav-link" th:href="@{/dashboard}"
                   th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a class="nav-link" th:href="@{/products}"
                   th:if="${canReadProducts}"
                   th:classappend="${activePage == 'products'} ? ' active' : ''">
                    <i class="bi bi-box"></i> Mahsulotlar
                </a>
                <a class="nav-link" th:href="@{/categories}"
                   th:if="${canReadCategories}"
                   th:classappend="${activePage == 'categories'} ? ' active' : ''">
                    <i class="bi bi-tag"></i> Kategoriyalar
                </a>
                <a class="nav-link" th:href="@{/orders}"
                   th:classappend="${activePage == 'orders'} ? ' active' : ''">
                    <i class="bi bi-cart3"></i> Buyurtmalar
                </a>
                <a class="nav-link" href="/warehouse"
                   th:classappend="${activePage == 'warehouse'} ? ' active' : ''">
                    <i class="bi bi-building"></i> Ombor
                </a>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-section-label">Operatsiyalar</span>
                <a class="nav-link" href="/transactions"
                   th:classappend="${activePage == 'transactions'} ? ' active' : ''">
                    <i class="bi bi-arrow-left-right"></i> Kirim / Chiqim
                </a>
                <a class="nav-link" href="#"
                   th:classappend="${activePage == 'suppliers'} ? ' active' : ''">
                    <i class="bi bi-people"></i> Yetkazib beruvchilar
                </a>
                <a class="nav-link" href="#"
                   th:classappend="${activePage == 'reports'} ? ' active' : ''">
                    <i class="bi bi-graph-up"></i> Hisobotlar
                </a>
            </div>

            <hr class="sidebar-divider">

            <div class="sidebar-section">
                <span class="sidebar-section-label">Tizim</span>

                <a class="nav-link" th:href="@{/users}"
                   sec:authorize="hasRole('ADMIN')"
                   th:classappend="${activePage == 'users'} ? ' active' : ''">
                    <i class="bi bi-people"></i> Foydalanuvchilar
                </a>

                <a class="nav-link" th:href="@{/users/profile}"
                   th:classappend="${activePage == 'settings'} ? ' active' : ''">
                    <i class="bi bi-gear"></i> Sozlamalar
                </a>
            </div>


        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</div>
                <div>
                    <div class="sidebar-user-name" th:text="${#authentication.name}">Username</div>

                    <div class="sidebar-user-role">
                        <span sec:authorize="hasAuthority('USER_MANAGE')">Super Administrator</span>

                        <span sec:authorize="!hasAuthority('USER_MANAGE')">Administrator</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="sidebar-user">
            </div>

            <form th:action="@{/auth/logout}" method="post" style="padding: 0 10px; margin-top: 5px;">
                <button type="submit" class="nav-link" style="width: 100%; background: none; border: none; text-align: left;">
                    <i class="bi bi-box-arrow-right" style="color: #ef4444;"></i>
                    <span style="color: #ef4444;">Chiqish</span>
                </button>
            </form>
        </div>

    </aside>

</div>
</html>
