<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtma qabul qilindi | Smart Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root{--primary:#f59e0b;--primary-dark:#d97706;--primary-glow:rgba(245,158,11,.15);--bg:#080e1a;--bg2:#0f172a;--bg3:#1a2236;--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--text:#f1f5f9;--text-muted:#94a3b8;--text-light:#475569;--success:#10b981;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}

        /* BG blobs */
        body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,.06),transparent 65%);border-radius:50%;pointer-events:none;}
        body::after{content:'';position:fixed;bottom:-80px;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,.05),transparent 65%);border-radius:50%;pointer-events:none;}

        /* PARTICLES */
        .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
        .particle{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:fall linear infinite;}
        @keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(360deg);}}
        .p1{background:var(--primary);left:10%;animation-duration:3s;animation-delay:.2s;animation-iteration-count:3;}
        .p2{background:#10b981;left:25%;animation-duration:3.5s;animation-delay:.5s;animation-iteration-count:3;}
        .p3{background:#3b82f6;left:45%;animation-duration:2.8s;animation-delay:.1s;animation-iteration-count:3;}
        .p4{background:#ef4444;left:65%;animation-duration:3.2s;animation-delay:.7s;animation-iteration-count:3;}
        .p5{background:#8b5cf6;left:82%;animation-duration:3s;animation-delay:.4s;animation-iteration-count:3;}
        .p6{background:var(--primary);left:55%;animation-duration:3.8s;animation-delay:.9s;animation-iteration-count:3;}
        .p7{background:#10b981;left:35%;animation-duration:2.5s;animation-delay:1.1s;animation-iteration-count:3;}
        .p8{background:#ef4444;left:90%;animation-duration:3.3s;animation-delay:.3s;animation-iteration-count:3;}

        /* SUCCESS CARD */
        .success-card{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:52px 48px 44px;max-width:520px;width:100%;text-align:center;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
        @keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
        /* top bar */
        .success-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#10b981,transparent);border-radius:24px 24px 0 0;}

        /* CHECK ICON */
        .check-wrap{position:relative;width:88px;height:88px;margin:0 auto 28px;}
        .check-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(16,185,129,.15);animation:ringPulse 2.5s ease-in-out 3;}
        @keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.15);opacity:.1;}}
        .check-circle{width:80px;height:80px;background:linear-gradient(135deg,#10b981,#34d399);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;margin:4px;box-shadow:0 8px 28px rgba(16,185,129,.35);animation:checkIn .5s .25s cubic-bezier(.34,1.56,.64,1) both;}
        @keyframes checkIn{from{transform:scale(0);}to{transform:scale(1);}}

        /* BADGE */
        .s-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:20px;font-size:12px;font-weight:700;color:#34d399;margin-bottom:14px;letter-spacing:.03em;}

        /* TEXT */
        .s-title{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.4px;color:#fff;margin-bottom:10px;}
        .s-desc{font-size:14.5px;color:var(--text-muted);line-height:1.65;margin-bottom:28px;}

        /* INFO GRID */
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
        .info-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 14px;text-align:left;}
        .info-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin-bottom:4px;}
        .info-val{font-size:13.5px;font-weight:700;color:var(--text);}
        .info-val.green{color:#34d399;}

        /* ORDER ID */
        .order-id-box{background:rgba(245,158,11,.06);border:1px dashed rgba(245,158,11,.25);border-radius:10px;padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
        .order-id-lbl{font-size:12px;color:var(--text-muted);}
        .order-id-val{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:var(--primary);}

        /* BUTTONS */
        .btn-group{display:flex;flex-direction:column;gap:10px;}
        .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;font-size:14.5px;font-family:inherit;font-weight:700;background:var(--primary);color:#000;border:none;border-radius:10px;text-decoration:none;transition:all .2s;cursor:pointer;box-shadow:0 4px 16px rgba(245,158,11,.2);}
        .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);color:#000;}
        .btn-ghost{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;font-size:13.5px;font-family:inherit;font-weight:600;background:transparent;color:var(--text-muted);border:1.5px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s;}
        .btn-ghost:hover{background:var(--surface2);color:var(--text);}

        /* BOTTOM NOTE */
        .bottom-note{margin-top:20px;font-size:12px;color:rgba(255,255,255,.1);font-family:'Sora',sans-serif;font-weight:600;letter-spacing:.05em;}

        @media(max-width:540px){.success-card{padding:36px 20px 28px;}.info-grid{grid-template-columns:1fr;}}
    </style>
    <!-- THEME: flash oldini olish -->
    <script>
        (function(){
            var t = localStorage.getItem('si-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        /* ══ LIGHT THEME ══ */
        [data-theme="light"] {
            --primary: #d97706;
            --primary-dark: #b45309;
            --primary-glow: rgba(217,119,6,.15);
            --bg:  #f8fafc;
            --bg2: #ffffff;
            --bg3: #f1f5f9;
            --bg4: #e2e8f0;
            --surface:  rgba(0,0,0,.03);
            --surface2: rgba(0,0,0,.05);
            --border:   rgba(0,0,0,.09);
            --border2:  rgba(0,0,0,.15);
            --text:       #0f172a;
            --text-muted: #475569;
            --text-light: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }
        [data-theme="light"] body { background: var(--bg); color: var(--text); }
        [data-theme="light"] .navbar { background: rgba(255,255,255,.92); border-bottom-color: rgba(0,0,0,.09); }
        [data-theme="light"] .cart-card,
        [data-theme="light"] .summary-card { background: #ffffff; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .cart-card-head,
        [data-theme="light"] .sc-head,
        [data-theme="light"] .sc-total { background: #f8fafc; }
        [data-theme="light"] .cart-item:hover { background: rgba(0,0,0,.02); }
        [data-theme="light"] .ci-name { color: #0f172a; }
        [data-theme="light"] .ci-price { color: #475569; }
        [data-theme="light"] .ci-img-ph { background: #f1f5f9; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .stepper { background: #f1f5f9; border-color: rgba(0,0,0,.09); }
        [data-theme="light"] .step-btn { color: #475569; }
        [data-theme="light"] .step-num { border-color: rgba(0,0,0,.09); color: #0f172a; }
        [data-theme="light"] .sc-label { color: #475569; }
        [data-theme="light"] .sc-val { color: #0f172a; }
        [data-theme="light"] .sc-row { border-bottom-color: rgba(0,0,0,.08); }
        [data-theme="light"] .secure-note { color: #94a3b8; }
        [data-theme="light"] .back-btn { background: #f1f5f9; color: #475569; border-color: rgba(0,0,0,.09); }
        [data-theme="light"] .back-btn:hover { color: #0f172a; border-color: rgba(0,0,0,.15); }
        [data-theme="light"] .empty-ico { background: #f1f5f9; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .empty-title { color: #0f172a; }
        [data-theme="light"] .empty-text { color: #475569; }
        [data-theme="light"] ::-webkit-scrollbar-track { background: #f1f5f9; }
        [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); }
        /* checkout specific */
        [data-theme="light"] .co-card { background: #ffffff; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .co-card-head { background: #f8fafc; color: #0f172a; border-bottom-color: rgba(0,0,0,.08); }
        [data-theme="light"] .form-control { background: #f8fafc; color: #0f172a; border-color: rgba(0,0,0,.12); }
        [data-theme="light"] .order-item { border-bottom-color: rgba(0,0,0,.08); }
        [data-theme="light"] .oi-name { color: #0f172a; }
        [data-theme="light"] .oi-meta { color: #475569; }
        [data-theme="light"] .oi-img-ph { background: #f1f5f9; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .page-title { color: #0f172a; }
        [data-theme="light"] .page-sub { color: #475569; }
        [data-theme="light"] .cancel-link { color: #475569; }
        [data-theme="light"] .steps { color: #475569; }
        [data-theme="light"] .step { color: #94a3b8; }
        [data-theme="light"] .step.active { color: #0f172a; }
        [data-theme="light"] .step-num { background: #f1f5f9; border-color: rgba(0,0,0,.1); }
        [data-theme="light"] .step-sep { color: #94a3b8; }
        /* success specific */
        [data-theme="light"] .success-card { background: #ffffff; border-color: rgba(0,0,0,.1); box-shadow: 0 32px 80px rgba(0,0,0,.12); }
        [data-theme="light"] .info-box { background: #f8fafc; border-color: rgba(0,0,0,.08); }
        [data-theme="light"] .info-val { color: #0f172a; }
        [data-theme="light"] .info-lbl { color: #94a3b8; }
        [data-theme="light"] .s-title { color: #0f172a; }
        [data-theme="light"] .s-desc { color: #475569; }
        [data-theme="light"] .btn-ghost { border-color: rgba(0,0,0,.12); color: #475569; }
        [data-theme="light"] .btn-ghost:hover { background: #f1f5f9; color: #0f172a; }
        [data-theme="light"] .bottom-note { color: rgba(0,0,0,.15); }
    </style>
</head>
<body>

<!-- Particles -->
<div class="particles">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
    <div class="particle p7"></div>
    <div class="particle p8"></div>
</div>

<div class="success-card">

    <!-- Check icon -->
    <div class="check-wrap">
        <div class="check-ring"></div>
        <div class="check-circle"><i class="bi bi-check-lg"></i></div>
    </div>

    <div class="s-badge"><i class="bi bi-patch-check-fill"></i> Tasdiqlandi</div>

    <h1 class="s-title">Buyurtmangiz<br>qabul qilindi!</h1>

    <p class="s-desc">
        Rahmat! Buyurtmangiz muvaffaqiyatli joylashtirildi.<br>
        Tez orada operatorlarimiz siz bilan bog'lanishadi.
    </p>

    <!-- Order ID (agar controller model'ga qo'shsa) -->
    <div class="order-id-box" th:if="${orderId}">
        <span class="order-id-lbl">Buyurtma raqami</span>
        <span class="order-id-val" th:text="'#' + ${orderId}">—</span>
    </div>

    <!-- Info grid -->
    <div class="info-grid">
        <div class="info-box">
            <div class="info-lbl">Holat</div>
            <div class="info-val green"><i class="bi bi-circle-fill" style="font-size:7px;"></i> Qabul qilindi</div>
        </div>
        <div class="info-box">
            <div class="info-lbl">Yetkazib berish</div>
            <div class="info-val">Bepul</div>
        </div>
        <div class="info-box">
            <div class="info-lbl">To'lov turi</div>
            <div class="info-val">Naqd pul</div>
        </div>
        <div class="info-box">
            <div class="info-lbl">Vaqt</div>
            <div class="info-val" id="orderTime">—</div>
        </div>
    </div>

    <div class="btn-group">
        <a th:href="@{/shop}" href="/shop" class="btn-primary">
            <i class="bi bi-bag-heart"></i> Xaridni davom ettirish
        </a>
        <a th:href="@{/users/profile}" href="/users/profile" class="btn-ghost">
            <i class="bi bi-person-circle"></i> Mening profilim
        </a>
    </div>

    <div class="bottom-note">SMART STORE © 2025</div>
</div>

<script>
    const now = new Date();
    document.getElementById('orderTime').textContent =
        now.toLocaleDateString('uz-UZ',{day:'numeric',month:'short'}) + ', ' +
        now.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'});
</script>
<script>
    const THEME_KEY = 'si-theme';
    function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem(THEME_KEY,t); }
    function toggleTheme(){
        var cur = localStorage.getItem(THEME_KEY)||'dark';
        var next = cur==='dark'?'light':'dark';
        applyTheme(next);
        var btn=document.getElementById('theme-toggle-btn');
        if(btn){ btn.innerHTML = next==='dark'?'<i class="bi bi-sun-fill"></i>':'<i class="bi bi-moon-fill"></i>'; }
    }
    document.addEventListener('DOMContentLoaded',function(){
        var btn=document.getElementById('theme-toggle-btn');
        if(!btn) return;
        var isDark=(localStorage.getItem(THEME_KEY)||'dark')==='dark';
        btn.innerHTML=isDark?'<i class="bi bi-sun-fill"></i>':'<i class="bi bi-moon-fill"></i>';
        btn.title=isDark?"Light rejimga o'tish":"Dark rejimga o'tish";
    });
</script>
</body>
</html>
